<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Carteiras - Macro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hudUsuario">
    <div id="dataHoraHud">00/00/0000 00:00:00</div>
    <div id="infoUsuario"></div>
    <div class="btns-hud">
        <button onclick="logout()">Sair</button>
    </div>
</div>

<div id="loginBox">
    <div class="box">
        <h2>Sistema Carteiras</h2>
        <input id="login" placeholder="Usuário">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="entrar()">Entrar</button>
        <button class="sec" onclick="abrirSenha()">Trocar Senha</button>
        <div id="msg"></div>
    </div>
</div>

<div id="menuBox" style="display:none;">
    <div class="container">
        <div class="card" onclick="abrirTela('cadastrarBox')">Cadastrar</div>
        <div class="card" onclick="abrirTela('pesquisarBox')">Pesquisar</div>
        <div class="card" onclick="abrirTela('entregarBox')">Entregar</div>
        <div class="card" onclick="abrirTela('listasBox')">Listas</div>
    </div> 
    <div style="position: absolute; left: 30px; bottom: 30px;">
        <button onclick="abrirAdmin()" style="width: auto; background: #8b5cf6; color: white; padding: 10px 25px; border-radius: 50px; font-weight: bold;">
            ⚙️ ÁREA ADMIN
        </button>
    </div> 
</div>

<div id="cadastrarBox" style="display:none;">
    <div class="box">
        <h2>Cadastro de Carteira</h2>
        <input id="cpf" placeholder="CPF (xxx.xxx.xxx-xx)" maxlength="14">
        <div id="msgCPF"></div>
        <input id="nome" placeholder="Nome completo">
        <input id="nascimento" type="tel" placeholder="Data de Nascimento" maxlength="10" oninput="mascaraData(this)">
        <input id="municipio" placeholder="Município">
        <input id="telefone" placeholder="Telefone">
        <div class="via-container">
            <label><input type="radio" name="via" id="via1" value="1ª" checked> 1ª Via</label>
            <label><input type="radio" name="via" id="via2" value="2ª"> 2ª Via</label>
        </div>
        <input id="codigoBoleto" placeholder="Código do boleto (OBRIGATÓRIO)">
        <button id="btnSalvar" onclick="salvarCadastro()">Salvar e Gerar Protocolo</button>
        <button class="cancel" onclick="abrirTela('menuBox')">Voltar ao Menu</button>
        <div id="msgCadastro"></div>
    </div>
</div>

<div id="entregarBox" style="display:none;">
    <div class="box">
        <h2>Registrar Entrega</h2>
        <input id="codigoCtr" placeholder="Código CTR">
        <div id="infoAlunoEntrega" style="display:none; text-align:left; background:#0f172a; padding:10px; margin:10px 0;">
            <b>Aluno:</b> <span id="resNomeAluno"></span><br>
            <b>CPF:</b> <span id="resCpfAluno"></span>
        </div>
        <label><input type="checkbox" id="checkTerceiro" onchange="toggleTerceiro()"> Entregar para Terceiro?</label>
        <div id="camposTerceiro" class="area-terceiro" style="opacity: 0.5;">
            <input id="nomeTerceiro" placeholder="Nome do Recebedor" disabled>
            <input id="cpfTerceiro" placeholder="CPF do Recebedor" disabled>
            <select id="parentesco" disabled>
                <option value="">Vínculo</option>
                <option value="Pai/Mãe">Pai/Mãe</option>
                <option value="Irmãos/filhos">Irmãos/filhos</option>
                <option value="Tios/primos/terceiros">Tios/primos/terceiros</option>
            </select>
        </div>
        <button onclick="salvarEntrega()">Confirmar e Imprimir</button>
        <button class="cancel" onclick="abrirTela('menuBox')">Voltar ao Menu</button>
    </div>
</div>

<div id="listasBox" style="display:none;">
    <div class="box" style="width: 95%; max-width: 1200px;">
        <h2>Relatório Geral</h2>
        <div id="areaImpressao" class="tabela-container">
            <table id="tabelaListas">
                <thead><tr id="cabecalhoTabela"></tr></thead>
                <tbody id="corpoTabelaListas"></tbody>
            </table>
        </div>
        <button class="cancel" onclick="abrirTela('menuBox')">Voltar ao Menu</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
